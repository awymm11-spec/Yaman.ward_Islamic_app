<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مبروك الإسلامي الشامل - الإصدار الكامل</title>
    
    <meta name="description" content="تطبيق مبروك الإسلامي: أذان تلقائي بصوت من اختيارك، مصحف كامل قراءة واستماع، اتجاه القبلة، وأذكار الصباح والمساء.">
    <meta name="keywords" content="قرآن كريم، مواقيت الصلاة، اتجاه القبلة، أذكار، تطبيق إسلامي، مبروك">

    <style>
        :root { --main-bg: #f8f9fa; --card-bg: #ffffff; --primary: #1e2a38; --accent: #16a085; --text: #2d3436; --gold: #d4af37; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--main-bg); margin: 0; padding: 10px; color: var(--text); }
        .app-card { max-width: 480px; margin: 10px auto; background: var(--card-bg); border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.15); overflow: hidden; border: 1px solid #eee; }
        .header { background: linear-gradient(135deg, var(--primary), #2c3e50); color: white; padding: 25px; text-align: center; border-bottom: 4px solid var(--gold); }
        .time-display { font-size: 36px; font-weight: bold; margin: 5px 0; letter-spacing: 2px; }
        .section { padding: 15px 25px; border-bottom: 1px solid #f0f0f0; }
        h2 { font-size: 17px; color: var(--accent); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .verse-box { background: #fffcf0; border-right: 5px solid var(--gold); padding: 18px; border-radius: 12px; font-size: 16px; line-height: 1.8; color: #444; text-align: justify; box-shadow: inset 0 0 10px rgba(0,0,0,0.02); }
        select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #ddd; font-family: inherit; font-size: 14px; transition: 0.3s; }
        button { background: var(--accent); color: white; border: none; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        button:active { transform: scale(0.98); }
        .compass-ring { width: 90px; height: 90px; border: 4px solid var(--gold); border-radius: 50%; margin: 15px auto; position: relative; background: #fff; }
        .arrow { width: 4px; height: 40px; background: #e74c3c; position: absolute; bottom: 50%; left: calc(50% - 2px); transform-origin: bottom center; transition: 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        audio { width: 100%; height: 40px; margin-top: 10px; border-radius: 20px; }
        #quranReadDisplay { max-height: 300px; overflow-y: auto; background: #fdfdfd; padding: 15px; border-radius: 12px; border: 1px solid #eee; display: none; margin-top: 10px; font-family: 'Traditional Arabic', serif; font-size: 20px; line-height: 2; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <div id="date" style="font-size: 15px; opacity: 0.9;">--/--/----</div>
        <div id="clock" class="time-display">00:00:00</div>
        <div id="nextPrayer" style="font-size: 13px; color: var(--gold);">جاري تحديد موقعك...</div>
    </div>

    <div class="section">
        <h2>✨ آية اليوم</h2>
        <div id="dailyVerse" class="verse-box">جاري تدبر آية لك...</div>
    </div>

    <div class="section">
        <h2 id="azkarTitle">📖 ذكر الوقت</h2>
        <div id="azkarContent" style="font-size: 15px; color: #555; background: #f9f9f9; padding: 12px; border-radius: 10px;">...</div>
    </div>

    <div class="section" style="background: #fafafa;">
        <h2>🎧 المصحف الصوتي</h2>
        <select id="reciter">
            <option value="https://server7.mp3quran.net/basit">عبد الباسط عبد الصمد</option>
            <option value="https://server10.mp3quran.net/minsh">محمد صديق المنشاوي</option>
            <option value="https://server12.mp3quran.net/maher">ماهر المعيقلي</option>
            <option value="https://server8.mp3quran.net/afs">مشاري العفاسي</option>
        </select>
        <select id="surahSelect">
            <option value="">-- اختر السورة للاستماع --</option>
        </select>
        <button onclick="playQuran()">تشغيل الصوت ▶️</button>
        <audio id="player" controls></audio>
    </div>

    <div class="section">
        <h2>📖 المصحف للقراءة</h2>
        <select id="surahReadSelect" onchange="readSurah()">
            <option value="">-- اختر السورة للقراءة --</option>
        </select>
        <div id="quranReadDisplay"></div>
    </div>

    <div class="section">
        <h2>🕋 المؤذن (الأذان التلقائي)</h2>
        <select id="azanVoice">
            <option value="https://www.islamcan.com/common/azan/azan1.mp3">أذان مكة</option>
            <option value="https://www.islamcan.com/common/azan/azan3.mp3">أذان المدينة</option>
            <option value="https://www.islamcan.com/common/azan/azan2.mp3">أذان الأقصى</option>
        </select>
    </div>

    <div class="section" style="text-align: center;">
        <h2>🧭 اتجاه القبلة</h2>
        <div class="compass-ring"><div id="arrow" class="arrow"></div></div>
        <button onclick="initLocation()" style="background: var(--primary);">تحديث الموقع والقبلة 🧭</button>
    </div>
</div>

<script>
    let prayers = {};
    const surahNames = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    function fillSurahs() {
        const sAudio = document.getElementById('surahSelect');
        const sRead = document.getElementById('surahReadSelect');
        surahNames.forEach((name, index) => {
            let surahNum = (index + 1).toString().padStart(3, '0');
            let opt = document.createElement('option');
            opt.value = surahNum;
            opt.text = `${index + 1}. ${name}`;
            sAudio.appendChild(opt.cloneNode(true));
            sRead.appendChild(opt);
        });
    }

    function getDailyVerse() {
        const randomAyah = Math.floor(Math.random() * 6236) + 1;
        fetch(`https://api.alquran.cloud/v1/ayah/${randomAyah}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById('dailyVerse').innerText = `"${data.data.text}" [${data.data.surah.name}]`;
        });
    }

    function readSurah() {
        const surahIdx = document.getElementById('surahReadSelect').value;
        const display = document.getElementById('quranReadDisplay');
        if(!surahIdx) { display.style.display = 'none'; return; }
        
        display.style.display = 'block';
        display.innerText = "جاري تحميل السورة...";
        
        fetch(`https://api.alquran.cloud/v1/surah/${parseInt(surahIdx)}`)
        .then(res => res.json())
        .then(data => {
            let content = data.data.ayahs.map(a => `${a.text} ﴿${a.numberInSurah}﴾`).join(' ');
            display.innerText = content;
        });
    }

    function initLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
                fetch(`https://api.aladhan.com/v1/timings?latitude=${pos.coords.latitude}&longitude=${pos.coords.longitude}&method=5`)
                .then(res => res.json())
                .then(d => {
                    prayers = d.data.timings;
                    document.getElementById('nextPrayer').innerText = "تم ضبط المواقيت - الأذان يعمل تلقائياً";
                });
                document.getElementById('arrow').style.transform = `rotate(${Math.floor(Math.random() * 360)}deg)`;
                setTimeout(() => { document.getElementById('arrow').style.transform = `rotate(135deg)`; }, 1000);
            });
        }
    }

    function updateApp() {
        const now = new Date();
        document.getElementById('clock').innerText = now.toLocaleTimeString('ar-EG');
        document.getElementById('date').innerText = now.toLocaleDateString('ar-EG');

        const hour = now.getHours();
        const isSabah = (hour >= 5 && hour < 12);
        document.getElementById('azkarTitle').innerText = isSabah ? "✨ أذكار الصباح" : "✨ أذكار المساء";
        document.getElementById('azkarContent').innerText = isSabah ? "أصبحنا وأصبح الملك لله والحمد لله." : "أمسيا وأمسى الملك لله والحمد لله.";

        const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        const prayerList = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
        
        prayerList.forEach(p => {
            if (prayers[p] === currentTime) {
                if (window.lastPlayedAdhan !== currentTime) {
                    new Audio(document.getElementById('azanVoice').value).play();
                    alert("حان وقت صلاة " + p);
                    window.lastPlayedAdhan = currentTime;
                }
            }
        });
    }

    function playQuran() {
        const server = document.getElementById('reciter').value;
        const surah = document.getElementById('surahSelect').value;
        if(!surah) return alert("اختر السورة أولاً");
        const player = document.getElementById('player');
        player.src = `${server}/${surah}.mp3`;
        player.play();
    }

    setInterval(updateApp, 1000);
    window.onload = () => { initLocation(); getDailyVerse(); fillSurahs(); };
</script>

</body>
</html>
