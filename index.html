<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق مبروك الإسلامي - المصحف والأذان</title>
    <meta name="description" content="تطبيق مبروك: أذان تلقائي، مصحف كامل، وقبلة دقيقة.">
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --card: #1a1a1a; --text: #e0e0e0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; text-align: center; }
        .app-card { max-width: 450px; margin: auto; background: var(--card); border: 1px solid var(--gold); border-radius: 20px; overflow: hidden; box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .header { background: linear-gradient(45deg, #1a1a1a, #2c2c2c); padding: 25px; border-bottom: 2px solid var(--gold); }
        .time { font-size: 35px; color: var(--gold); font-weight: bold; }
        .section { padding: 15px; border-bottom: 1px solid #333; }
        h2 { font-size: 18px; color: var(--gold); }
        .verse { font-style: italic; color: #bbb; padding: 10px; background: #222; border-radius: 10px; }
        select, button { width: 90%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--gold); background: #222; color: white; cursor: pointer; }
        button { background: var(--gold); color: black; font-weight: bold; }
        #status { color: #27ae60; font-size: 13px; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <div id="clock" class="time">00:00:00</div>
        <div id="date" style="color: #888;">--/--/----</div>
        <div id="status">جاري تفعيل نظام الأذان...</div>
    </div>

    <div class="section">
        <h2>✨ آية اليوم</h2>
        <div id="dailyVerse" class="verse">...</div>
    </div>

    <div class="section">
        <h2>📖 المصحف الصوتي</h2>
        <select id="reciter">
            <option value="https://server7.mp3quran.net/basit">عبد الباسط عبد الصمد</option>
            <option value="https://server10.mp3quran.net/minsh">محمد صديق المنشاوي</option>
            <option value="https://server12.mp3quran.net/maher">ماهر المعيقلي</option>
        </select>
        <select id="surahSelect"><option value="">-- اختر السورة --</option></select>
        <button onclick="playQuran()">تشغيل القرآن ▶️</button>
        <audio id="player" controls style="width: 90%; margin-top: 10px;"></audio>
    </div>

    <div class="section">
        <button onclick="initApp()" style="background: #333; color: var(--gold);">تحديث موقعك والقبلة 🧭</button>
    </div>
</div>

<audio id="adhanPlayer" src="https://www.islamcan.com/common/adhan/adhan1.mp3"></audio>

<script>
    let prayerTimes = {};
    const surahs = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    function fillSurahs() {
        const s = document.getElementById('surahSelect');
        surahs.forEach((n, i) => {
            let opt = document.createElement('option');
            opt.value = (i + 1).toString().padStart(3, '0');
            opt.text = `${i+1}. ${n}`;
            s.appendChild(opt);
        });
    }

    function initApp() {
        navigator.geolocation.getCurrentPosition(p => {
            fetch(`https://api.aladhan.com/v1/timings?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&method=5`)
            .then(r => r.json()).then(d => {
                prayerTimes = d.data.timings;
                document.getElementById('status').innerText = "تم تفعيل الأذان التلقائي ✅";
                console.log("المواقيت:", prayerTimes);
            });
        });
    }

    function checkAdhan() {
        const now = new Date();
        const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        
        // الصلاوات التي سيتم الأذان لها
        const prayers = ["Fajr", "Dhuhr", "Asr", "Maghrib", "Isha"];
        prayers.forEach(p => {
            if (prayerTimes[p] === currentTime) {
                const adhan = document.getElementById('adhanPlayer');
                if (adhan.paused) {
                    adhan.play();
                    alert("حان الآن موعد أذان " + p);
                }
            }
        });
    }

    function playQuran() {
        const s = document.getElementById('surahSelect').value;
        const r = document.getElementById('reciter').value;
        if(!s) return alert("اختر سورة");
        const p = document.getElementById('player');
        p.src = `${r}/${s}.mp3`;
        p.play();
    }

    setInterval(() => {
        const n = new Date();
        document.getElementById('clock').innerText = n.toLocaleTimeString('ar-EG');
        document.getElementById('date').innerText = n.toLocaleDateString('ar-EG');
        checkAdhan();
    }, 1000);

    window.onload = () => { 
        fillSurahs(); 
        initApp();
        fetch('https://api.alquran.cloud/v1/ayah/' + Math.floor(Math.random()*6236))
        .then(r=>r.json()).then(d => document.getElementById('dailyVerse').innerText = d.data.text);
    };
</script>
</body>
</html>
